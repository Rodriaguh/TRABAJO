<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOT • Sistema de Inteligencia Táctica</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="scout-grid-overlay"></div>
    <div class="ambient-glow"></div>

    <nav class="banner">
        <div class="banner-top">
            <div class="logo-container">
                <img src="https://cdn.prod.website-files.com/64ea57571d50b02423c4505d/64fa2af723cae8e0aa0e0101_attack%20on%20titan%20logo.png" alt="AOT" class="banner-logo">
            </div>
            <div class="system-status">
                <span class="pulse-dot"></span>
                <span class="status-text">SISTEMA ACTIVO • DISTRITO SHIGANSHINA</span>
            </div>
        </div>
        <div id="particles"></div>

        <div class="buttons-grid"> 
            <button class="btn-tactical active" onclick="irAlInicio()">
                <span class="btn-icon">🏠</span> BASE DE DATOS
            </button>
            <button class="btn-tactical" onclick="cargarApi(event)" name="characters">
                <span class="btn-icon">👤</span> PERSONAJES
            </button>
            <button class="btn-tactical" onclick="cargarApi(event)" name="titans">
                <span class="btn-icon">👹</span> TITANES
            </button>
            <button class="btn-tactical" onclick="cargarApi(event)" name="locations">
                <span class="btn-icon">📍</span> REGIONES
            </button>
            <button class="btn-tactical" onclick="cargarApi(event)" name="episodes">
                <span class="btn-icon">📖</span> BITÁCORAS
            </button>
            <button class="btn-tactical" onclick="cargarApi(event)" name="organizations">
                <span class="btn-icon">🛡️</span> FACCIONES
            </button>
        </div>
    </nav>

    <main class="contenedor-principal">
        
        <section class="home-section" id="home">
            <div class="tactical-header">
                <span class="scout-serial">REF: REGISTRO-ANIME-2026</span>
                <h1 class="main-title">ARCHIVOS CLASIFICADOS</h1>
                <p class="main-subtitle">Acceso exclusivo para el cuerpo de exploración. Datos recopilados del mundo exterior.</p>
            </div>

            <div class="walls-monitor">
                <h2 class="panel-title">MONITOR DE LAS MURALLAS</h2>
                <div class="walls-grid">
                    <div class="wall-card">
                        <div class="wall-info"><span>WALL MARIA</span><span class="status-good">COMPLETA</span></div>
                        <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
                    </div>
                    <div class="wall-card">
                        <div class="wall-info"><span>WALL ROSE</span><span class="status-good">COMPLETA</span></div>
                        <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
                    </div>
                    <div class="wall-card">
                        <div class="wall-info"><span>WALL SINA</span><span class="status-good">COMPLETA</span></div>
                        <div class="progress-bar"><div class="progress" style="width: 100%"></div></div>
                    </div>
                </div>
            </div>
        </section>

        <div id="panelHerramientas" class="tools-panel" style="display: none;">
            <input type="text" id="buscador" placeholder="Filtrar registros en tiempo real..." oninput="filtrarTarjetas()">
            <button class="btn-filter" onclick="ordenarTarjetas()">🔤 Ordenar A-Z</button>
        </div>

        <section id="resultado" class="grid-resultados"></section>
    </main>

    <button id="btnVolverArriba" class="btn-scroll-top" onclick="subirAlInicio()">
        <span class="arrow">↑</span>
        <span class="hover-text">SUBIR</span>
    </button>

    <script src="style.js"></script>
</body>
</html>
